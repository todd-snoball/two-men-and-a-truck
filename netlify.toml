# Allow the Netlify Image CDN to optimize images served from these remote domains.
# Without this, every /.netlify/images?url=... request for an external image is
# blocked and the image renders blank. Add a new line here if a page ever pulls
# images from a domain not listed below.
[images]
  remote_images = [
    'https://images\.bestcompany\.com/.*',
    'https://s3\.us-west-1\.amazonaws\.com/.*'
  ]

# Long, immutable cache for the self-hosted Inter font files in /fonts.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
